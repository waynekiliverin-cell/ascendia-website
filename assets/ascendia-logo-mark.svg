<svg width="1200" height="980" viewBox="0 0 216 176" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ASCENDIA Logo Mark</title>
  <desc id="desc">A stylized ASCENDIA monogram in silver white and gold.</desc>
  <g filter="url(#softShadow)">
    <!-- left silver stroke -->
    <path d="M93.5 55.5H111.8L78.2 122.8H61.7L93.5 55.5Z" fill="url(#silver)"/>
    <!-- right silver stroke -->
    <path d="M111.7 78.2H127.8L155.2 122.8H138.6L111.7 78.2Z" fill="url(#silver2)"/>
    <!-- gold ascender -->
    <path d="M108.2 55.5H139.8V64.7H124.5L96.2 122.8H80.2L108.2 55.5Z" fill="url(#gold)"/>
    <!-- subtle lower cut / refinement -->
    <path d="M102.2 113.1H126.5V122.8H98.2L102.2 113.1Z" fill="#0B1324" fill-opacity="0.1"/>
  </g>
  <defs>
    <linearGradient id="silver" x1="61.7" y1="55.5" x2="112" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#D8DEE6"/>
    </linearGradient>
    <linearGradient id="silver2" x1="111" y1="78" x2="156" y2="123" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#D8DEE6"/>
    </linearGradient>
    <linearGradient id="gold" x1="80" y1="55" x2="141" y2="123" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1D884"/>
      <stop offset="0.52" stop-color="#D6B85F"/>
      <stop offset="1" stop-color="#C7A647"/>
    </linearGradient>
    <filter id="softShadow" x="55" y="51" width="108" height="80" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>
</svg>
